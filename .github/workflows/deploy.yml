name: Deploy to edge-01

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EDGE01_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.EDGE01_HOST }} >> ~/.ssh/known_hosts

      - name: Build and deploy
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.EDGE01_HOST }} '
            cd /tmp/healthlog-landing &&
            git fetch origin main &&
            git reset --hard origin/main &&
            docker build --network host -t o8g80o008scc48c884coo0kk:latest . &&
            cd /data/coolify/applications/o8g80o008scc48c884coo0kk &&
            docker compose up -d --force-recreate
          '
