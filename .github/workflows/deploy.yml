name: Deploy to edge-01

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EDGE01_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking accept-new" >> ~/.ssh/config

      - name: Deploy
        env:
          HOST: ${{ secrets.EDGE01_HOST }}
        run: |
          ssh -o ServerAliveInterval=15 -o ServerAliveCountMax=20 root@$HOST 'bash -s' << 'DEPLOY'
          set -e
          COMMIT="${GITHUB_SHA:-latest}"
          REPO_DIR="/tmp/healthlog-landing"
          APP_DIR="/data/coolify/applications/o8g80o008scc48c884coo0kk"
          IMAGE="o8g80o008scc48c884coo0kk:latest"

          echo "==> Pulling latest code"
          cd "$REPO_DIR"
          git fetch origin main
          git reset --hard origin/main

          echo "==> Building image"
          docker build --network host -q -t "$IMAGE" .

          echo "==> Updating compose"
          sed -i "s|image: '[^']*'|image: '${IMAGE}'|" "$APP_DIR/docker-compose.yaml"

          echo "==> Recreating container"
          cd "$APP_DIR"
          docker compose up -d --force-recreate 2>&1

          echo "==> Deploy complete"
          DEPLOY
